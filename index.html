<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UN Sending States' Youth Exchange Camp</title>
<style>
  :root{
    --bg-top:#eef1f4;
    --bg-bot:#d8dde3;
    --ink:#1d2733;
    --sub:#5b6875;
    --accent:#0047a0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--bg-bot);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  }
  #app{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}

  .hud{position:fixed;left:0;right:0;pointer-events:none;}
  .top{top:0;padding:20px 22px;}
  .kicker{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:700;
  }
  .title{
    margin-top:4px;font-size:19px;font-weight:650;letter-spacing:-.01em;color:var(--ink);
  }
  .title small{display:block;font-weight:500;font-size:12.5px;color:var(--sub);letter-spacing:0;margin-top:2px;}

  .hint{
    bottom:0;padding:0 0 22px;text-align:center;
    font-size:12.5px;color:var(--sub);
    transition:opacity .6s ease;
  }
  .hint b{color:var(--ink);font-weight:600;}
  .hint .dot{opacity:.4;margin:0 8px;}

  #loader{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
    z-index:10;transition:opacity .5s ease;
  }
  #loader .ring{
    width:34px;height:34px;border-radius:50%;
    border:3px solid rgba(0,71,160,.18);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:520px){
    .title{font-size:16px;}
    .top{padding:16px 18px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="hud top">
  <div class="kicker">UN Sending States' Youth Exchange Camp</div>
  <div class="title">UNVEIL<small>by Group 3</small></div>
</div>

<div class="hud hint" id="hint">
  <b>Drag</b> Rotate<span class="dot">·</span><b>Scroll/Pinch</b> Magnify<span class="dot">·</span><b>더블클릭</b> 리셋
</div>

<div id="loader"><div class="ring"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ---------------------------------------------------------
   0. 기본 셋업
--------------------------------------------------------- */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe7eaee);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.1, 100);
let camDist = 8.2;
camera.position.set(0, 0, camDist);
camera.lookAt(0, -0.1, 0);

/* 스튜디오 배경 스윕(굴절에 비칠 배경) */
(function backdrop(){
  const c = document.createElement('canvas'); c.width=64; c.height=256;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,256);
  grad.addColorStop(0,'#f6f8fa');
  grad.addColorStop(0.55,'#e7eaee');
  grad.addColorStop(1,'#cdd3da');
  g.fillStyle=grad; g.fillRect(0,0,64,256);
  const tex = new THREE.CanvasTexture(c);
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshBasicMaterial({map:tex, depthWrite:false})
  );
  plane.position.set(0,0,-14);
  scene.add(plane);
})();

/* ---------------------------------------------------------
   1. 조명 + 환경맵 (유리 반사용)
--------------------------------------------------------- */
scene.add(new THREE.HemisphereLight(0xffffff, 0xb9c1cb, 0.75));
const key = new THREE.DirectionalLight(0xffffff, 1.15);
key.position.set(4, 6, 7); scene.add(key);
const fill = new THREE.DirectionalLight(0xdfe8ff, 0.5);
fill.position.set(-6, 2, 4); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.8);
rim.position.set(-2, 3, -6); scene.add(rim);

(function makeEnv(){
  const c = document.createElement('canvas'); c.width=512; c.height=256;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,256);
  grad.addColorStop(0,'#ffffff');
  grad.addColorStop(0.5,'#d6dde6');
  grad.addColorStop(1,'#aeb8c4');
  g.fillStyle=grad; g.fillRect(0,0,512,256);
  // soft light blobs -> 유리에 반사 하이라이트
  function blob(x,y,r,a){ const rg=g.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0,'rgba(255,255,255,'+a+')'); rg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=rg; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }
  blob(120,70,90,0.9); blob(380,60,70,0.7); blob(260,180,120,0.5);
  const tex = new THREE.CanvasTexture(c);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromEquirectangular(tex).texture;
  tex.dispose();
})();

/* ---------------------------------------------------------
   2. 국기 텍스처 (앞면 데칼)
--------------------------------------------------------- */
function roundRectPath(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}
function stripesH(c,w,h,cols){ const n=cols.length,sh=h/n;
  for(let i=0;i<n;i++){c.fillStyle=cols[i];c.fillRect(0,i*sh,w,sh+0.5);} }
function stripesV(c,w,h,cols){ const n=cols.length,sw=w/n;
  for(let i=0;i<n;i++){c.fillStyle=cols[i];c.fillRect(i*sw,0,sw+0.5,h);} }

function unionJack(c,w,h){
  c.fillStyle='#012169'; c.fillRect(0,0,w,h);
  c.save(); roundRectPath(c,0,0,w,h,3); c.clip();
  c.lineWidth=h*0.28; c.strokeStyle='#fff';
  c.beginPath(); c.moveTo(0,0); c.lineTo(w,h); c.moveTo(w,0); c.lineTo(0,h); c.stroke();
  c.lineWidth=h*0.11; c.strokeStyle='#C8102E';
  c.beginPath(); c.moveTo(0,0); c.lineTo(w,h); c.moveTo(w,0); c.lineTo(0,h); c.stroke();
  c.restore();
  c.fillStyle='#fff'; c.fillRect(0,h*0.36,w,h*0.28); c.fillRect(w*0.36,0,w*0.28,h);
  c.fillStyle='#C8102E'; c.fillRect(0,h*0.43,w,h*0.14); c.fillRect(w*0.43,0,w*0.14,h);
}
function star(c,x,y,r,pts,rot){
  c.beginPath();
  for(let i=0;i<pts*2;i++){ const rr=i%2?r*0.42:r;
    const a=(i/(pts*2))*Math.PI*2 + (rot||-Math.PI/2);
    c[i?'lineTo':'moveTo'](x+Math.cos(a)*rr, y+Math.sin(a)*rr); }
  c.closePath(); c.fill();
}

const FLAGS = {
  usa(c,w,h){ const cols=[]; for(let i=0;i<13;i++)cols.push(i%2?'#fff':'#B22234'); stripesH(c,w,h,cols);
    c.fillStyle='#3C3B6E'; c.fillRect(0,0,w*0.42,h*0.54);
    c.fillStyle='#fff'; for(let r=0;r<4;r++)for(let k=0;k<5;k++){ c.beginPath();
      c.arc(w*0.06+k*w*0.08, h*0.09+r*h*0.13, 1.4,0,7); c.fill(); } },
  uk(c,w,h){ unionJack(c,w,h); },
  germany(c,w,h){ stripesH(c,w,h,['#000000','#DD0000','#FFCE00']); },
  italy(c,w,h){ stripesV(c,w,h,['#009246','#ffffff','#CE2B37']); },
  norway(c,w,h){ c.fillStyle='#BA0C2F'; c.fillRect(0,0,w,h);
    c.fillStyle='#fff'; c.fillRect(w*0.28,0,h*0.30,h); c.fillRect(0,h*0.35,w,h*0.30);
    c.fillStyle='#00205B'; c.fillRect(w*0.34,0,h*0.16,h); c.fillRect(0,h*0.42,w,h*0.16); },
  denmark(c,w,h){ c.fillStyle='#C8102E'; c.fillRect(0,0,w,h);
    c.fillStyle='#fff'; c.fillRect(w*0.30,0,h*0.16,h); c.fillRect(0,h*0.42,w,h*0.16); },
  india(c,w,h){ stripesH(c,w,h,['#FF9933','#ffffff','#138808']);
    c.strokeStyle='#000080'; c.lineWidth=1.4; c.beginPath();
    c.arc(w/2,h/2,h*0.13,0,7); c.stroke(); },
  sweden(c,w,h){ c.fillStyle='#006AA7'; c.fillRect(0,0,w,h);
    c.fillStyle='#FECC00'; c.fillRect(w*0.30,0,h*0.16,h); c.fillRect(0,h*0.42,w,h*0.16); },
  colombia(c,w,h){ c.fillStyle='#FCD116'; c.fillRect(0,0,w,h*0.5);
    c.fillStyle='#003893'; c.fillRect(0,h*0.5,w,h*0.25);
    c.fillStyle='#CE1126'; c.fillRect(0,h*0.75,w,h*0.25); },
  luxembourg(c,w,h){ stripesH(c,w,h,['#ED2939','#ffffff','#00A1DE']); },
  ethiopia(c,w,h){ stripesH(c,w,h,['#078930','#FCDD09','#DA121A']);
    c.fillStyle='#0F47AF'; c.beginPath(); c.arc(w/2,h/2,h*0.20,0,7); c.fill();
    c.fillStyle='#FCDD09'; star(c,w/2,h/2,h*0.13,5,-Math.PI/2); },
  belgium(c,w,h){ stripesV(c,w,h,['#000000','#FAE042','#ED2939']); },
  greece(c,w,h){ const cols=[]; for(let i=0;i<9;i++)cols.push(i%2?'#ffffff':'#0D5EAF'); stripesH(c,w,h,cols);
    c.fillStyle='#0D5EAF'; c.fillRect(0,0,w*0.38,h*0.55);
    c.fillStyle='#fff'; c.fillRect(w*0.15,0,w*0.08,h*0.55); c.fillRect(0,h*0.22,w*0.38,h*0.11); },
  southafrica(c,w,h){ c.fillStyle='#DE3831'; c.fillRect(0,0,w,h*0.5);
    c.fillStyle='#002395'; c.fillRect(0,h*0.5,w,h*0.5);
    c.fillStyle='#fff'; c.beginPath(); c.moveTo(0,h*0.06);c.lineTo(w*0.55,h/2);c.lineTo(0,h*0.94);c.closePath(); c.fill();
    c.fillStyle='#007A4D'; c.beginPath(); c.moveTo(0,h*0.18);c.lineTo(w*0.42,h/2);c.lineTo(0,h*0.82);c.closePath(); c.fill();
    c.fillStyle='#000'; c.beginPath(); c.moveTo(0,0);c.lineTo(w*0.30,h/2);c.lineTo(0,h);c.closePath(); c.fill(); },
  thailand(c,w,h){ stripesH(c,w,h,['#A51931','#F4F5F8','#2D2A4A','#2D2A4A','#F4F5F8','#A51931']); },
  turkey(c,w,h){ c.fillStyle='#E30A17'; c.fillRect(0,0,w,h);
    c.fillStyle='#fff'; c.beginPath(); c.arc(w*0.42,h/2,h*0.24,0,7); c.fill();
    c.fillStyle='#E30A17'; c.beginPath(); c.arc(w*0.48,h/2,h*0.19,0,7); c.fill();
    c.fillStyle='#fff'; star(c,w*0.62,h/2,h*0.11,5,-Math.PI/2); },
  philippines(c,w,h){ c.fillStyle='#0038A8'; c.fillRect(0,0,w,h*0.5);
    c.fillStyle='#CE1126'; c.fillRect(0,h*0.5,w,h*0.5);
    c.fillStyle='#fff'; c.beginPath(); c.moveTo(0,0);c.lineTo(w*0.5,h/2);c.lineTo(0,h);c.closePath(); c.fill();
    c.fillStyle='#FCD116'; c.beginPath(); c.arc(w*0.16,h/2,h*0.10,0,7); c.fill();
    for(let i=0;i<3;i++){ const ang=[-Math.PI/2, Math.PI*0.14, Math.PI*0.86][i];
      star(c, w*0.08+Math.cos(ang)*w*0.28, h/2+Math.sin(ang)*h*0.36, 2.5,5,-Math.PI/2); } },
  newzealand(c,w,h){ c.fillStyle='#00247D'; c.fillRect(0,0,w,h);
    c.save(); c.translate(0,0); c.scale(0.5,0.5); unionJack(c,w,h); c.restore();
    c.fillStyle='#CC142B'; [[0.72,0.30],[0.86,0.52],[0.66,0.62],[0.80,0.78]].forEach(p=>
      star(c,w*p[0],h*p[1],2.4,5,-Math.PI/2)); },
  france(c,w,h){ stripesV(c,w,h,['#0055A4','#ffffff','#EF4135']); },
  canada(c,w,h){ c.fillStyle='#fff'; c.fillRect(0,0,w,h);
    c.fillStyle='#FF0000'; c.fillRect(0,0,w*0.25,h); c.fillRect(w*0.75,0,w*0.25,h);
    c.beginPath(); const cx=w/2,cy=h*0.52,s=h*0.34;
    const pts=[[0,-1],[0.15,-0.4],[0.5,-0.55],[0.32,-0.15],[0.62,-0.05],[0.3,0.15],[0.42,0.55],
      [0.1,0.35],[0,0.7],[-0.1,0.35],[-0.42,0.55],[-0.3,0.15],[-0.62,-0.05],[-0.32,-0.15],[-0.5,-0.55],[-0.15,-0.4]];
    pts.forEach((p,i)=>c[i?'lineTo':'moveTo'](cx+p[0]*s, cy+p[1]*s)); c.closePath(); c.fill(); },
  netherlands(c,w,h){ stripesH(c,w,h,['#AE1C28','#ffffff','#21468B']); },
  australia(c,w,h){ c.fillStyle='#00247D'; c.fillRect(0,0,w,h);
    c.save(); c.scale(0.5,0.5); unionJack(c,w,h); c.restore();
    c.fillStyle='#fff'; star(c,w*0.25,h*0.78,3.2,7,-Math.PI/2);
    [[0.72,0.28],[0.86,0.5],[0.66,0.6],[0.80,0.78],[0.75,0.5]].forEach(p=>
      star(c,w*p[0],h*p[1],2.2,7,-Math.PI/2)); }
};

/* 22 참전국 (전투 16 + 의료 6) */
const ORDER = ['germany','usa','uk','australia','netherlands','canada','france','newzealand',
  'philippines','turkey','thailand','southafrica','greece','belgium','ethiopia','luxembourg',
  'colombia','sweden','india','denmark','norway','italy'];

function drawTaegeuk(g,cx,cy,r){
  g.save(); g.translate(cx,cy); g.rotate(-Math.PI*0.187 + Math.PI/2);
  g.fillStyle='#cd2e3a'; g.beginPath(); g.arc(0,0,r,0,7); g.fill();
  g.fillStyle='#0047a0'; g.beginPath(); g.arc(0,0,r,0,Math.PI); g.fill();
  g.fillStyle='#cd2e3a'; g.beginPath(); g.arc(-r/2,0,r/2,0,7); g.fill();
  g.fillStyle='#0047a0'; g.beginPath(); g.arc(r/2,0,r/2,0,7); g.fill();
  g.restore();
}
function drawTrigram(g,cx,cy,rot,pattern,barW,barH,gap){
  g.save(); g.translate(cx,cy); g.rotate(rot);
  g.fillStyle='#0f0f14';
  const total=3*barH+2*gap; let y=-total/2;
  pattern.forEach(solid=>{
    if(solid){ g.fillRect(-barW/2,y,barW,barH); }
    else{ const seg=barW*0.42; g.fillRect(-barW/2,y,seg,barH); g.fillRect(barW/2-seg,y,seg,barH); }
    y+=barH+gap;
  });
  g.restore();
}

function buildDecalTexture(){
  const W=1200,H=1440;
  const c=document.createElement('canvas'); c.width=W;c.height=H;
  const g=c.getContext('2d');
  const cx=W/2, cy=610;

  // 은은한 올리브 프레임
  g.strokeStyle='rgba(120,150,110,0.30)'; g.lineWidth=6; g.lineCap='round';
  g.beginPath(); g.arc(cx,cy,470,Math.PI*0.62,Math.PI*0.95); g.stroke();
  g.beginPath(); g.arc(cx,cy,470,Math.PI*0.05,Math.PI*0.38); g.stroke();

  // 평화의 비둘기(단순 실루엣)
  g.fillStyle='rgba(255,255,255,0.95)'; g.strokeStyle='rgba(160,175,190,0.6)'; g.lineWidth=2;
  g.save(); g.translate(cx-150,cy-360);
  g.beginPath();
  g.moveTo(0,0); g.bezierCurveTo(30,-18,55,-6,60,10);
  g.bezierCurveTo(48,6,40,10,34,20); g.bezierCurveTo(28,4,10,4,0,0);
  g.bezierCurveTo(-14,10,-30,6,-40,-6); g.bezierCurveTo(-24,-4,-14,-10,0,0);
  g.closePath(); g.fill(); g.stroke();
  g.restore();

  // 중앙 태극 + 4괘
  drawTaegeuk(g,cx,cy,80);
  const rt=185, bw=100, bh=16, gp=10;
  drawTrigram(g, cx-rt*0.72, cy-rt*0.72, -Math.PI/4, [1,1,1], bw,bh,gp); // 건 (좌상)
  drawTrigram(g, cx+rt*0.72, cy-rt*0.72,  Math.PI/4, [0,1,0], bw,bh,gp); // 감 (우상)
  drawTrigram(g, cx-rt*0.72, cy+rt*0.72,  Math.PI/4, [1,0,1], bw,bh,gp); // 리 (좌하)
  drawTrigram(g, cx+rt*0.72, cy+rt*0.72, -Math.PI/4, [0,0,0], bw,bh,gp); // 곤 (우하)

  // 국기 링
  const ring=430, fw=104, fh=68;
  ORDER.forEach((name,i)=>{
    const a = -Math.PI/2 + (i/ORDER.length)*Math.PI*2;
    const px = cx + Math.cos(a)*ring;
    const py = cy + Math.sin(a)*ring;
    g.save();
    g.translate(px-fw/2, py-fh/2);
    // 얇은 깃대
    g.strokeStyle='rgba(90,100,110,0.55)'; g.lineWidth=2.4;
    g.beginPath(); g.moveTo(-3,-6); g.lineTo(-3,fh+10); g.stroke();
    // 그림자
    g.save(); roundRectPath(g,2,3,fw,fh,4); g.fillStyle='rgba(30,40,50,0.18)'; g.fill(); g.restore();
    g.save(); roundRectPath(g,0,0,fw,fh,4); g.clip();
    (FLAGS[name]||function(cc,w,h){cc.fillStyle='#ccc';cc.fillRect(0,0,w,h);})(g,fw,fh);
    g.restore();
    g.save(); roundRectPath(g,0,0,fw,fh,4); g.strokeStyle='rgba(255,255,255,0.9)'; g.lineWidth=1.5; g.stroke(); g.restore();
    g.restore();
  });

  // 하단 타이틀
  g.textAlign='center';
  g.fillStyle='#153a6b';
  g.font='600 40px "Segoe UI",Helvetica,Arial,sans-serif';
  g.fillText("UN Sending States' Youth Exchange Camp", cx, cy+560);

  // 국가보훈부 로고(단순 태극 심볼 + 텍스트)
  const ly=cy+640;
  g.save(); g.translate(cx-160, ly-8);
  g.fillStyle='#0047a0'; g.beginPath(); g.arc(0,0,18,Math.PI*0.5,Math.PI*1.5); g.fill();
  g.fillStyle='#cd2e3a'; g.beginPath(); g.arc(0,0,18,-Math.PI*0.5,Math.PI*0.5); g.fill();
  g.fillStyle='#fff'; g.beginPath(); g.arc(0,-9,9,0,7); g.fill();
  g.fillStyle='#0047a0'; g.beginPath(); g.arc(0,-9,9,Math.PI*0.5,Math.PI*1.5); g.fill();
  g.fillStyle='#cd2e3a'; g.beginPath(); g.arc(0,9,9,0,7); g.fill();
  g.fillStyle='#fff'; g.beginPath(); g.arc(0,9,9,-Math.PI*0.5,Math.PI*0.5); g.fill();
  g.restore();
  g.textAlign='left'; g.fillStyle='#1d2733';
  g.font='700 42px "Malgun Gothic","Apple SD Gothic Neo",sans-serif';
  g.fillText('국가보훈부', cx-125, ly+4);
  g.fillStyle='#6b7683'; g.font='400 20px "Segoe UI",Arial,sans-serif';
  g.fillText('Ministry of Patriots and Veterans Affairs', cx-125, ly+30);

  const tex=new THREE.CanvasTexture(c);
  tex.anisotropy=8; tex.needsUpdate=true;
  return tex;
}

/* 도그택 텍스처 */
function buildTagTexture(){
  const W=320,H=560; const c=document.createElement('canvas');c.width=W;c.height=H;
  const g=c.getContext('2d');
  g.clearRect(0,0,W,H);
  g.textAlign='center';
  g.fillStyle='#123a7a'; g.font='700 44px "Segoe UI",Arial,sans-serif';
  g.fillText('NAME', W/2, 150);
  g.strokeStyle='#333'; g.lineWidth=3;
  g.beginPath(); g.moveTo(70,190); g.lineTo(250,190); g.stroke();
  g.fillStyle='#123a7a'; g.fillText('COUNTRY', W/2, 300);
  g.beginPath(); g.moveTo(70,340); g.lineTo(250,340); g.stroke();
  // UN 심볼(단순 지구+월계관)
  g.strokeStyle='#123a7a'; g.lineWidth=3;
  g.beginPath(); g.arc(W/2,440,42,0,7); g.stroke();
  g.beginPath(); g.arc(W/2,440,22,0,7); g.stroke();
  for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; g.beginPath();
    g.moveTo(W/2+Math.cos(a)*22,440+Math.sin(a)*22);
    g.lineTo(W/2+Math.cos(a)*42,440+Math.sin(a)*42); g.stroke(); }
  const tex=new THREE.CanvasTexture(c); tex.anisotropy=8; return tex;
}

/* ---------------------------------------------------------
   3. 모델 조립
--------------------------------------------------------- */
const model = new THREE.Group();
scene.add(model);

const BW=2.2, BH=3.2, DEP=0.62, RAD=0.55, BEV=0.14;

// 병 실루엣 shape
function bottleShape(){
  const s=new THREE.Shape();
  const w=BW/2, h=BH/2, r=RAD, nk=0.34; // 목 폭
  s.moveTo(-w+r,-h);
  s.lineTo(w-r,-h); s.quadraticCurveTo(w,-h,w,-h+r);
  s.lineTo(w,h-r-0.15); s.quadraticCurveTo(w,h-0.15,w-r,h-0.05);
  s.lineTo(nk,h+0.02); s.lineTo(nk,h+0.16);           // 어깨 -> 목
  s.lineTo(-nk,h+0.16); s.lineTo(-nk,h+0.02);
  s.lineTo(-w+r,h-0.05); s.quadraticCurveTo(-w,h-0.15,-w,h-r-0.15);
  s.lineTo(-w,-h+r); s.quadraticCurveTo(-w,-h,-w+r,-h);
  return s;
}
const bodyGeo=new THREE.ExtrudeGeometry(bottleShape(),{
  depth:DEP, bevelEnabled:true, bevelThickness:BEV, bevelSize:BEV, bevelSegments:4, curveSegments:24
});
bodyGeo.center();

const glass=new THREE.MeshPhysicalMaterial({
  color:0xf2f7ff, metalness:0, roughness:0.06,
  transmission:0.94, thickness:1.4, ior:1.46,
  clearcoat:0.6, clearcoatRoughness:0.15,
  transparent:true, opacity:0.9, envMapIntensity:1.4,
  side:THREE.DoubleSide
});
const body=new THREE.Mesh(bodyGeo,glass);
model.add(body);

// 앞면 데칼 plane
const decalMat=new THREE.MeshBasicMaterial({
  map:buildDecalTexture(), transparent:true, depthWrite:false, side:THREE.DoubleSide
});
const decal=new THREE.Mesh(new THREE.PlaneGeometry(BW*0.86, BW*0.86*1440/1200), decalMat);
decal.position.set(0, 0.05, DEP/2+BEV+0.015);
model.add(decal);

// 목
const neckMat=new THREE.MeshStandardMaterial({color:0xf2f7ff, metalness:0, roughness:0.1,
  transparent:true, opacity:0.85, envMapIntensity:1.2});
const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.30,0.34,0.34,32), glass);
neck.position.set(0, BH/2+0.30, 0);
model.add(neck);

// ---- 캡 어셈블 ----
const cap=new THREE.Group();
cap.position.set(0, BH/2+0.62, 0);
model.add(cap);
const blk=new THREE.MeshStandardMaterial({color:0x121316, metalness:0.35, roughness:0.55});
const blk2=new THREE.MeshStandardMaterial({color:0x0b0c0e, metalness:0.4, roughness:0.4});

const capBody=new THREE.Mesh(new THREE.CylinderGeometry(0.40,0.42,0.5,40), blk);
cap.add(capBody);
// 리지(주름)
const ridgeGeo=new THREE.BoxGeometry(0.035,0.5,0.06);
for(let i=0;i<28;i++){ const a=i/28*Math.PI*2; const r=new THREE.Mesh(ridgeGeo,blk2);
  r.position.set(Math.cos(a)*0.41,0,Math.sin(a)*0.41); r.rotation.y=-a; cap.add(r); }
// 캡 상단
const capTop=new THREE.Mesh(new THREE.CylinderGeometry(0.30,0.40,0.14,40), blk2);
capTop.position.y=0.30; cap.add(capTop);
// 손잡이 링(플립 루프)
const loop=new THREE.Mesh(new THREE.TorusGeometry(0.20,0.05,16,40), blk);
loop.position.set(0.32,0.30,0); loop.rotation.y=Math.PI/2; cap.add(loop);
// 체인 고정 링
const clip=new THREE.Mesh(new THREE.TorusGeometry(0.06,0.02,12,24), blk2);
clip.position.set(0.44,0.28,0); clip.rotation.y=Math.PI/2; cap.add(clip);

// ---- 볼체인 ----
const metal=new THREE.MeshStandardMaterial({color:0xcfd4da, metalness:1, roughness:0.28, envMapIntensity:1.5});
const chainStart=new THREE.Vector3(0.44, BH/2+0.90, 0.05);
const tagTop=new THREE.Vector3(1.55, 0.55, 0.30);
const curve=new THREE.CatmullRomCurve3([
  chainStart,
  new THREE.Vector3(0.95, BH/2+0.55, 0.28),
  new THREE.Vector3(1.35, BH/2-0.15, 0.40),
  new THREE.Vector3(1.60, 1.35, 0.36),
  tagTop
]);
const beadGeo=new THREE.SphereGeometry(0.045,10,8);
const beads=48;
const chainMesh=new THREE.InstancedMesh(beadGeo, metal, beads);
const dummy=new THREE.Object3D();
for(let i=0;i<beads;i++){ const p=curve.getPoint(i/(beads-1));
  dummy.position.copy(p); dummy.updateMatrix(); chainMesh.setMatrixAt(i,dummy.matrix); }
model.add(chainMesh);

// ---- 도그택 ----
const tag=new THREE.Group();
tag.position.copy(tagTop); tag.position.y-=0.55; tag.rotation.z=-0.12;
model.add(tag);
function stadiumShape(w,h,r){ const s=new THREE.Shape();
  s.moveTo(-w/2+r,-h/2); s.lineTo(w/2-r,-h/2); s.quadraticCurveTo(w/2,-h/2,w/2,-h/2+r);
  s.lineTo(w/2,h/2-r); s.quadraticCurveTo(w/2,h/2,w/2-r,h/2);
  s.lineTo(-w/2+r,h/2); s.quadraticCurveTo(-w/2,h/2,-w/2,h/2-r);
  s.lineTo(-w/2,-h/2+r); s.quadraticCurveTo(-w/2,-h/2,-w/2+r,-h/2); return s; }
const plate=new THREE.Mesh(new THREE.ExtrudeGeometry(stadiumShape(0.62,1.05,0.28),
  {depth:0.05,bevelEnabled:true,bevelThickness:0.02,bevelSize:0.02,bevelSegments:2,curveSegments:16}),
  new THREE.MeshStandardMaterial({color:0xdfe3e8, metalness:1, roughness:0.32, envMapIntensity:1.6}));
tag.add(plate);
const tagFace=new THREE.Mesh(new THREE.PlaneGeometry(0.55,0.96),
  new THREE.MeshBasicMaterial({map:buildTagTexture(), transparent:true}));
tagFace.position.z=0.081; tag.add(tagFace);
// 택 구멍 링
const hole=new THREE.Mesh(new THREE.TorusGeometry(0.045,0.02,10,20), metal);
hole.position.set(0,0.46,0.03); tag.add(hole);

// 바닥 그림자
(function shadow(){
  const c=document.createElement('canvas');c.width=256;c.height=256;
  const g=c.getContext('2d'); const rg=g.createRadialGradient(128,128,10,128,128,120);
  rg.addColorStop(0,'rgba(20,30,45,0.42)'); rg.addColorStop(1,'rgba(20,30,45,0)');
  g.fillStyle=rg; g.beginPath(); g.arc(128,128,120,0,7); g.fill();
  const t=new THREE.CanvasTexture(c);
  const sh=new THREE.Mesh(new THREE.PlaneGeometry(4.2,3.4),
    new THREE.MeshBasicMaterial({map:t,transparent:true,depthWrite:false}));
  sh.rotation.x=-Math.PI/2; sh.position.set(0.2,-BH/2-0.55,0); scene.add(sh);
})();

model.position.y=0.15;

/* ---------------------------------------------------------
   4. 수동 컨트롤 (드래그 회전 · 휠/핀치 줌 · 터치)
--------------------------------------------------------- */
let targetRotY=-0.35, targetRotX=0.12, rotY=-0.35, rotX=0.12;
let velX=0, velY=0, dragging=false, lastX=0, lastY=0;
const MINX=-1.15, MAXX=1.15, MIND=5.2, MAXD=13;
let idle=true, idleT=0;

function onDown(x,y){ dragging=true; idle=false; lastX=x; lastY=y; velX=velY=0; hideHint(); }
function onMove(x,y){ if(!dragging)return;
  const dx=(x-lastX), dy=(y-lastY); lastX=x; lastY=y;
  velY=dx*0.006; velX=dy*0.006;
  targetRotY+=velY; targetRotX+=velX;
  targetRotX=Math.max(MINX,Math.min(MAXX,targetRotX));
}
function onUp(){ dragging=false; }

const el=renderer.domElement;
el.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('mouseup',onUp);
el.addEventListener('dblclick',()=>{ targetRotY=-0.35; targetRotX=0.12; camDist=8.2; });
el.addEventListener('wheel',e=>{ e.preventDefault(); camDist*=(1+e.deltaY*0.0011);
  camDist=Math.max(MIND,Math.min(MAXD,camDist)); hideHint(); },{passive:false});

// 터치
let pinchStart=0, pinchDist0=0;
el.addEventListener('touchstart',e=>{ if(e.touches.length===1){ onDown(e.touches[0].clientX,e.touches[0].clientY); }
  else if(e.touches.length===2){ dragging=false; pinchDist0=touchDist(e); pinchStart=camDist; } },{passive:false});
el.addEventListener('touchmove',e=>{ e.preventDefault();
  if(e.touches.length===1&&dragging){ onMove(e.touches[0].clientX,e.touches[0].clientY); }
  else if(e.touches.length===2){ const d=touchDist(e);
    camDist=Math.max(MIND,Math.min(MAXD, pinchStart*(pinchDist0/d))); } },{passive:false});
el.addEventListener('touchend',e=>{ if(e.touches.length===0) onUp(); });
function touchDist(e){ const a=e.touches[0],b=e.touches[1];
  return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }

let hintHidden=false;
function hideHint(){ if(hintHidden)return; hintHidden=true;
  const h=document.getElementById('hint'); h.style.opacity='0'; }

/* ---------------------------------------------------------
   5. 렌더 루프
--------------------------------------------------------- */
function animate(){
  requestAnimationFrame(animate);
  // 관성
  if(!dragging){ targetRotY+=velY; targetRotX+=velX;
    targetRotX=Math.max(MINX,Math.min(MAXX,targetRotX));
    velX*=0.94; velY*=0.94;
    // 방치 시 살짝 자동 회전
    if(idle){ idleT+=0.005; targetRotY+=0.0016; }
  } else { idle=false; }
  if(Math.abs(velX)<0.0002&&Math.abs(velY)<0.0002&&!dragging) idle=true; else idle=false;

  rotY += (targetRotY-rotY)*0.12;
  rotX += (targetRotX-rotX)*0.12;
  model.rotation.y=rotY; model.rotation.x=rotX;

  camera.position.z += (camDist-camera.position.z)*0.12;
  camera.lookAt(0,-0.05,0);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// 로더 제거
setTimeout(()=>{ const l=document.getElementById('loader');
  l.style.opacity='0'; setTimeout(()=>l.remove(),500); }, 350);

})();
</script>
